<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Job Application Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="script.js" ></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div class="max-w-6xl mx-auto py-10 px-6">

    <h1 class="text-3xl font-bold text-gray-800 mb-8">
      Job Application Tracker
    </h1>

    <!-- Stats -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
      <div class="bg-white shadow rounded-xl p-6">
        <p class="text-gray-500 text-sm">Total</p>
        <h2 id="total-count" class="text-2xl font-bold text-gray-800 mt-2">0</h2>
      </div>
      <div class="bg-white shadow rounded-xl p-6">
        <p class="text-gray-500 text-sm">Interview</p>
        <h2 id="interview-count" class="text-2xl font-bold text-green-600 mt-2">0</h2>
      </div>
      <div class="bg-white shadow rounded-xl p-6">
        <p class="text-gray-500 text-sm">Rejected</p>
        <h2 id="rejected-count" class="text-2xl font-bold text-red-500 mt-2">0</h2>
      </div>
    </div>

    <!-- Filter Count -->
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-lg font-semibold text-gray-700">Available Jobs</h2>
      <p id="filter-count" class="text-sm text-gray-500"></p>
    </div>
     <!-- Filters -->
    <div class="flex gap-3 mb-6">
      <button id="btn-all" onclick="filterJobs('all')" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm">All</button>
      <button id="btn-interview" onclick="filterJobs('interview')" class="px-4 py-2 bg-gray-200 rounded-lg text-sm">Interview</button>
      <button id="btn-rejected" onclick="filterJobs('rejected')" class="px-4 py-2 bg-gray-200 rounded-lg text-sm">Rejected</button>
    </div>

    <!-- Jobs -->
    <div id="job-list" class="space-y-6"></div>

    <!-- No Jobs -->
    <div id="no-jobs" class="hidden text-center mt-10">
     <img src="./jobs.png" 
       class="mx-auto mb-4 opacity-80">
        <p class="text-xl text-gray-700">No jobs available</p>
    </div>

  </div>
